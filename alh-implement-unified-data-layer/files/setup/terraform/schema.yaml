title: "Unify the Data Layer with Oracle Autonomous AI Lakehouse"
description: "Provision Autonomous AI Lakehouse, Object Storage seed data, workshop schemas, and vector-search assets."
schemaVersion: 1.1.0
version: "20260714"
locale: "en"

variableGroups:
  - title: "OCI Placement"
    variables:
      - compartment_ocid
      - region

  - title: "Lakehouse Configuration"
    variables:
      - name_prefix
      - workshop_username
      - compute_count
      - data_storage_size_in_tbs
      - license_model

  - title: "Advanced Configuration"
    variables:
      - create_iam_resources
      - embedding_model_download_uri

  - title: "Hidden"
    visible: false
    variables:
      - tenancy_ocid

variables:
  tenancy_ocid:
    type: oci:identity:tenancy:id
    required: true
    visible: false

  compartment_ocid:
    type: oci:identity:compartment:id
    title: "Target compartment"
    description: "Compartment for Autonomous AI Lakehouse, Object Storage, and workshop resources."
    required: true

  region:
    type: oci:identity:region:name
    title: "Region"
    required: true

  name_prefix:
    type: string
    title: "Resource name prefix"
    default: "alh-unified-data"
    required: true

  workshop_username:
    type: string
    title: "Workshop database username"
    default: "SEER_WORKSHOP"
    required: true

  compute_count:
    type: integer
    title: "ECPU count"
    default: 2
    minimum: 2
    required: true

  data_storage_size_in_tbs:
    type: integer
    title: "Storage in TB"
    default: 1
    minimum: 1
    required: true

  license_model:
    type: enum
    title: "License model"
    enum:
      - "LICENSE_INCLUDED"
      - "BRING_YOUR_OWN_LICENSE"
    default: "LICENSE_INCLUDED"
    required: true

  create_iam_resources:
    type: boolean
    title: "Create resource-principal IAM resources"
    description: "Create the dynamic group and Object Storage read policy required by the lab."
    default: true
    required: true

  embedding_model_download_uri:
    type: string
    title: "Oracle ONNX model download URL"
    description: "Override only if Oracle rotates the public all-MiniLM-L12-v2 PAR URL."
    default: "https://adwc4pm.objectstorage.us-ashburn-1.oci.customer-oci.com/p/TtH6hL2y25EypZ0-rrczRZ1aXp7v1ONbRBfCiT-BDBN8WLKQ3lgyW6RxCfIFLdA6/n/adwc4pm/b/OML-ai-models/o/all_MiniLM_L12_v2_augmented.zip"
    required: true

outputs:
  database_admin_password:
    type: string
    title: "Database ADMIN password"
    displayText: "Database ADMIN password"

  workshop_username:
    type: string
    title: "Workshop username"
    displayText: "Workshop username"

  workshop_user_password:
    type: string
    title: "Workshop user password"
    displayText: "Workshop user password"

  object_storage_base_uri:
    type: string
    title: "Object Storage base URI"
    displayText: "Object Storage base URI"

  supplier_csv_object_uri:
    type: string
    title: "Supplier CSV object URI"
    displayText: "Supplier CSV object URI"
