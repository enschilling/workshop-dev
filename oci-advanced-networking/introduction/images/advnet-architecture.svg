<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 680" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="arS" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#2563eb"/></marker>
    <marker id="arP" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="arPS" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#7c3aed"/></marker>
    <marker id="arSl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="arSlS" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#475569"/></marker>
  </defs>
  <rect width="1280" height="680" fill="#ffffff"/>
  <text x="640" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">Advanced &amp; Multi-Cloud Networking &#8212; Target Architecture</text>
  <text x="640" y="60" text-anchor="middle" font-size="13" fill="#64748b">A DRG hub-and-spoke across two OCI regions, extended to Azure, with central inspection and secure access</text>

  <!-- ===================== PHOENIX ===================== -->
  <rect x="24" y="92" width="280" height="508" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="24" y="92" width="234" height="26" rx="6" fill="#e2e8f0"/>
  <text x="40" y="110" font-size="12.5" font-weight="600" fill="#334155">OCI &#8212; US West (Phoenix)</text>

  <rect x="44" y="146" width="240" height="150" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="58" y="168" font-size="12.5" font-weight="700" fill="#1e293b">advnet-remotespoke-vcn</text>
  <text x="58" y="185" font-size="10.5" font-family="monospace" fill="#475569">10.2.0.0/16</text>
  <rect x="58" y="198" width="212" height="80" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="68" y="216" font-size="10" font-weight="600" fill="#1e3a8a">Private subnet 10.2.0.0/24</text>
  <rect x="68" y="226" width="192" height="42" rx="4" fill="#ffffff" stroke="#64748b"/>
  <text x="164" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">advnet-remotespoke-vm</text>
  <text x="164" y="258" text-anchor="middle" font-size="9" fill="#64748b">Linux &#183; no public IP</text>

  <rect x="92" y="430" width="120" height="70" rx="10" fill="#2563eb"/>
  <text x="152" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">DRG</text>
  <text x="152" y="478" text-anchor="middle" font-size="9" font-family="monospace" fill="#dbeafe">advnet-drg-phx</text>
  <line x1="152" y1="296" x2="152" y2="430" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#arS)"/>

  <!-- ===================== ASHBURN (HUB) ===================== -->
  <rect x="336" y="92" width="600" height="508" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="336" y="92" width="300" height="26" rx="6" fill="#dbeafe"/>
  <text x="352" y="110" font-size="12.5" font-weight="700" fill="#1e3a8a">OCI &#8212; US East (Ashburn) &#183; HUB</text>

  <!-- Hub VCN with firewall -->
  <rect x="360" y="146" width="262" height="212" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="374" y="168" font-size="12.5" font-weight="700" fill="#1e293b">advnet-hub-vcn</text>
  <text x="374" y="184" font-size="10.5" font-family="monospace" fill="#475569">10.0.0.0/16</text>
  <rect x="374" y="196" width="234" height="60" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="491" y="214" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">&#128737; Network Firewall</text>
  <text x="491" y="230" text-anchor="middle" font-size="9" font-family="monospace" fill="#b45309">advnet-nfw &#183; 10.0.2.0/24</text>
  <text x="491" y="245" text-anchor="middle" font-size="9" fill="#b45309">central N-S + E-W inspection</text>
  <rect x="374" y="264" width="234" height="44" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="384" y="282" font-size="9.5" font-weight="600" fill="#1e3a8a">Private 10.0.1.0/24</text>
  <text x="384" y="297" font-size="9" font-family="monospace" fill="#475569">advnet-hub-vm 10.0.1.233</text>
  <text x="374" y="328" font-size="9" fill="#64748b">+ IGW &#183; NAT &#183; Service Gateway</text>

  <!-- Spoke-1 VCN with bastion -->
  <rect x="650" y="146" width="262" height="212" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="664" y="168" font-size="12.5" font-weight="700" fill="#1e293b">advnet-spoke1-vcn</text>
  <text x="664" y="184" font-size="10.5" font-family="monospace" fill="#475569">10.1.0.0/16</text>
  <rect x="664" y="196" width="234" height="56" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="781" y="214" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">&#128272; OCI Bastion</text>
  <text x="781" y="230" text-anchor="middle" font-size="9" fill="#166534">secure access &#183; SSH + RDP-over-SSH</text>
  <text x="781" y="244" text-anchor="middle" font-size="8.5" fill="#15803d">no public IPs &#183; time-bound &#183; audited</text>
  <rect x="664" y="260" width="234" height="48" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="674" y="278" font-size="9.5" font-weight="600" fill="#1e3a8a">Private 10.1.0.0/24</text>
  <text x="674" y="293" font-size="9" font-family="monospace" fill="#475569">advnet-spoke1-win-vm 10.1.0.10</text>
  <text x="674" y="305" font-size="8.5" fill="#64748b">Windows Server &#183; RDP target</text>

  <!-- Ashburn DRG -->
  <rect x="575" y="438" width="132" height="78" rx="10" fill="#2563eb"/>
  <text x="641" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">DRG</text>
  <text x="641" y="490" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#dbeafe">advnet-drg-iad</text>
  <line x1="500" y1="358" x2="610" y2="438" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#arS)"/>
  <line x1="781" y1="358" x2="672" y2="438" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#arS)"/>

  <!-- ===================== AZURE ===================== -->
  <rect x="968" y="92" width="288" height="508" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="968" y="92" width="240" height="26" rx="6" fill="#e2e8f0"/>
  <text x="984" y="110" font-size="12.5" font-weight="600" fill="#334155">Microsoft Azure &#8212; East US</text>

  <rect x="988" y="146" width="248" height="170" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="1002" y="168" font-size="12.5" font-weight="700" fill="#1e293b">advnet-azure-vnet</text>
  <text x="1002" y="185" font-size="10.5" font-family="monospace" fill="#475569">10.10.0.0/16</text>
  <rect x="1002" y="198" width="220" height="64" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="1012" y="216" font-size="10" font-weight="600" fill="#1e3a8a">Workload subnet 10.10.0.0/24</text>
  <rect x="1012" y="224" width="200" height="32" rx="4" fill="#ffffff" stroke="#64748b"/>
  <text x="1112" y="244" text-anchor="middle" font-size="10" font-family="monospace" fill="#1e293b">advnet-azure-vm &#183; 10.10.0.4</text>
  <text x="1002" y="284" font-size="9" fill="#64748b">+ GatewaySubnet 10.10.255.0/27</text>

  <rect x="988" y="420" width="150" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="1063" y="437" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1e3a8a">ExpressRoute GW</text>
  <text x="1063" y="451" text-anchor="middle" font-size="8" font-family="monospace" fill="#475569">advnet-azure-ergw</text>

  <rect x="988" y="468" width="150" height="42" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="1063" y="485" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3730a3">VPN Gateway</text>
  <text x="1063" y="499" text-anchor="middle" font-size="8" font-family="monospace" fill="#475569">advnet-azure-vpngw</text>

  <line x1="1138" y1="440" x2="1180" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="1138" y1="489" x2="1188" y2="300" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>

  <!-- ===================== INTER-REGION + INTERCONNECT LINKS ===================== -->
  <!-- RPC Phoenix <-> Ashburn -->
  <line x1="212" y1="468" x2="575" y2="472" stroke="#7c3aed" stroke-width="3" marker-end="url(#arP)" marker-start="url(#arPS)"/>
  <rect x="300" y="520" width="190" height="40" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="395" y="538" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5b21b6">RPC &#183; cross-region peering</text>
  <text x="395" y="552" text-anchor="middle" font-size="8.5" fill="#6d28d9">Oracle backbone (private)</text>

  <!-- FastConnect/ExpressRoute (primary) -->
  <line x1="707" y1="468" x2="988" y2="440" stroke="#2563eb" stroke-width="3.5" marker-end="url(#ar)" marker-start="url(#arS)"/>
  <!-- IPSec VPN (backup) -->
  <line x1="707" y1="492" x2="988" y2="489" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#ar)" marker-start="url(#arS)"/>
  <rect x="740" y="524" width="220" height="56" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="850" y="542" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1e3a8a">FastConnect &#8596; ExpressRoute</text>
  <text x="850" y="556" text-anchor="middle" font-size="8.5" fill="#475569">dedicated interconnect (primary)</text>
  <text x="850" y="570" text-anchor="middle" font-size="8.5" fill="#3730a3">+ IPSec VPN (backup)</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="24" y="616" width="1232" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="44" y="630" width="18" height="14" rx="3" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="70" y="642" font-size="10.5" fill="#475569">Network Firewall &#8212; central inspection (Lab 3)</text>
  <rect x="330" y="630" width="18" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="356" y="642" font-size="10.5" fill="#475569">Bastion &#8212; secure access (Lab 4)</text>
  <line x1="600" y1="637" x2="636" y2="637" stroke="#7c3aed" stroke-width="3"/>
  <text x="644" y="642" font-size="10.5" fill="#475569">RPC (Lab 1)</text>
  <line x1="740" y1="637" x2="776" y2="637" stroke="#2563eb" stroke-width="3"/>
  <text x="784" y="642" font-size="10.5" fill="#475569">Interconnect (Lab 2)</text>
  <line x1="940" y1="637" x2="976" y2="637" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="984" y="642" font-size="10.5" fill="#475569">IPSec VPN (Lab 2)</text>
</svg>
